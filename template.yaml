AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Distributed Image Processing Pipeline with Step Functions and Rekognition

##########################################################################
# GLOBAL CONFIGURATION
##########################################################################
Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Tracing: Active # Enable X-Ray on ALL Lambdas
    Environment:
      Variables:
        POWERTOOLS_SERVICE_NAME: image-pipeline
        LOG_LEVEL: INFO

##########################################################################
# PARAMETERS
##########################################################################
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment name (dev or prod)

##########################################################################
# RESOURCES
##########################################################################
Resources:
  ##########################################################################
  # S3 BUCKETS
  ##########################################################################

  # Uploads bucket - stores original images
  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-uploads-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
              - POST
            AllowedOrigins:
              - "*"
            MaxAge: 3600

  # Processed bucket - stores resized images
  ProcessedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-processed-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ##########################################################################
  # DYNAMODB TABLE
  ##########################################################################

  ResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-results-${Environment}"
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        - AttributeName: imageId
          AttributeType: S
        - AttributeName: processingType
          AttributeType: S
      KeySchema:
        - AttributeName: imageId
          KeyType: HASH
        - AttributeName: processingType
          KeyType: RANGE
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: ttl

  ##########################################################################
  # LAMBDA LAYERS
  ##########################################################################

  ##########################################################################
  # LAMBDA LAYERS
  ##########################################################################

  #deleted

  ##########################################################################
  # LAMBDA FUNCTIONS
  ##########################################################################

  # Presigned URL Generator
  PresignedUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-presigned-url-${Environment}"
      CodeUri: src/presigned-url/
      Handler: index.handler
      Description: Generates S3 presigned URLs for image uploads
      Environment:
        Variables:
          UPLOADS_BUCKET_NAME: !Ref UploadsBucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref UploadsBucket
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /upload-url
            Method: POST
            RestApiId: !Ref ImagePipelineApi

  # Rekognition Labels Lambda
  RekognitionLabelsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-rekognition-labels-${Environment}"
      CodeUri: src/rekognition-labels/
      Handler: index.handler
      Description: Detects labels in images using AWS Rekognition
      Environment:
        Variables:
          UPLOADS_BUCKET_NAME: !Ref UploadsBucket
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref UploadsBucket
        - RekognitionDetectOnlyPolicy: {}

  # Rekognition Faces Lambda
  RekognitionFacesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-rekognition-faces-${Environment}"
      CodeUri: src/rekognition-faces/
      Handler: index.handler
      Description: Detects faces in images using AWS Rekognition
      Environment:
        Variables:
          UPLOADS_BUCKET_NAME: !Ref UploadsBucket
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref UploadsBucket
        - RekognitionDetectOnlyPolicy: {}

  # Image Resize Lambda
  # Image Resize Lambda
  ImageResizeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-image-resize-${Environment}"
      CodeUri: src/image-resize/
      Handler: index.handler
      Description: Resizes images into multiple dimensions
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          UPLOADS_BUCKET_NAME: !Ref UploadsBucket
          PROCESSED_BUCKET_NAME: !Ref ProcessedBucket
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref UploadsBucket
        - S3CrudPolicy:
            BucketName: !Ref ProcessedBucket
      Layers:
        - arn:aws:lambda:ap-south-1:823151422906:layer:image-pipeline-sharp-layer-dev:3

  # Aggregator Lambda
  AggregatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-aggregator-${Environment}"
      CodeUri: src/aggregator/
      Handler: index.handler
      Description: Aggregates results from parallel processing branches
      Environment:
        Variables:
          RESULTS_TABLE_NAME: !Ref ResultsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ResultsTable

  # Notification Lambda (DynamoDB Stream trigger)
  NotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-notification-${Environment}"
      CodeUri: src/notification/
      Handler: index.handler
      Description: Process DynamoDB Stream events and send notifications
      Events:
        DynamoDBStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt ResultsTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 10
            MaximumBatchingWindowInSeconds: 5
            FilterCriteria:
              Filters:
                - Pattern: '{"dynamodb": {"NewImage": {"processingType": {"S": ["AGGREGATED"]}}}}'
      Policies:
        - DynamoDBStreamReadPolicy:
            TableName: !Ref ResultsTable
            StreamName:
              !Select [3, !Split ["/", !GetAtt ResultsTable.StreamArn]]

  ##########################################################################
  # API GATEWAY
  ##########################################################################

  ImagePipelineApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "${AWS::StackName}-api-${Environment}"
      StageName: !Ref Environment
      TracingEnabled: true # Enable X-Ray on API Gateway
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  ##########################################################################
  # STEP FUNCTIONS STATE MACHINE
  ##########################################################################

  ImageProcessingStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub "${AWS::StackName}-pipeline-${Environment}"
      DefinitionUri: statemachine/pipeline.asl.json
      DefinitionSubstitutions:
        UploadsBucketName: !Ref UploadsBucket
        ProcessedBucketName: !Ref ProcessedBucket
        ResultsTableName: !Ref ResultsTable
        RekognitionLabelsFunctionArn: !GetAtt RekognitionLabelsFunction.Arn
        RekognitionFacesFunctionArn: !GetAtt RekognitionFacesFunction.Arn
        ImageResizeFunctionArn: !GetAtt ImageResizeFunction.Arn
        AggregatorFunctionArn: !GetAtt AggregatorFunction.Arn
      Tracing:
        Enabled: true
      Policies:
        - CloudWatchLogsFullAccess
        - AWSXRayDaemonWriteAccess
        - LambdaInvokePolicy:
            FunctionName: !Ref RekognitionLabelsFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref RekognitionFacesFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref ImageResizeFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref AggregatorFunction
      Type: STANDARD
      Logging:
        Level: ALL
        IncludeExecutionData: true
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt StateMachineLogGroup.Arn

  # CloudWatch Log Group for Step Functions
  StateMachineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/vendedlogs/states/${AWS::StackName}-pipeline-${Environment}"
      RetentionInDays: 7

  ##########################################################################
  # EVENTBRIDGE RULE
  ##########################################################################

  S3UploadRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-s3-upload-rule-${Environment}"
      Description: Trigger Step Functions when image is uploaded to S3
      EventBusName: default
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref UploadsBucket
          object:
            key:
              - prefix: uploads/
      State: ENABLED
      Targets:
        - Id: ImageProcessingStateMachineTarget
          Arn: !GetAtt ImageProcessingStateMachine.Arn
          RoleArn: !GetAtt EventBridgeStepFunctionsRole.Arn
          RetryPolicy:
            MaximumRetryAttempts: 2
            MaximumEventAgeInSeconds: 3600

  # IAM Role for EventBridge to invoke Step Functions
  EventBridgeStepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeStateMachine
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - states:StartExecution
                Resource: !GetAtt ImageProcessingStateMachine.Arn

##########################################################################
# OUTPUTS
##########################################################################
Outputs:
  UploadsBucketName:
    Description: S3 bucket for image uploads
    Value: !Ref UploadsBucket
    Export:
      Name: !Sub "${AWS::StackName}-UploadsBucket"

  ProcessedBucketName:
    Description: S3 bucket for processed images
    Value: !Ref ProcessedBucket
    Export:
      Name: !Sub "${AWS::StackName}-ProcessedBucket"

  ResultsTableName:
    Description: DynamoDB table for processing results
    Value: !Ref ResultsTable
    Export:
      Name: !Sub "${AWS::StackName}-ResultsTable"

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ImagePipelineApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-ApiEndpoint"

  PresignedUrlEndpoint:
    Description: Endpoint to request presigned upload URLs
    Value: !Sub "https://${ImagePipelineApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/upload-url"

  PipelineStateMachineArn:
    Description: Step Functions State Machine ARN
    Value: !GetAtt ImageProcessingStateMachine.Arn
    Export:
      Name: !Sub "${AWS::StackName}-StateMachineArn"

  PipelineStateMachineName:
    Description: Step Functions State Machine Name
    Value: !GetAtt ImageProcessingStateMachine.Name
