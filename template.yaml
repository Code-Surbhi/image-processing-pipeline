AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Distributed Image Processing Pipeline with Step Functions and Rekognition

##########################################################################
# GLOBAL CONFIGURATION
##########################################################################
Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Tracing: Active # Enable X-Ray on ALL Lambdas
    Environment:
      Variables:
        POWERTOOLS_SERVICE_NAME: image-pipeline
        LOG_LEVEL: INFO

##########################################################################
# PARAMETERS
##########################################################################
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment name (dev or prod)

##########################################################################
# RESOURCES
##########################################################################
Resources:
  ##########################################################################
  # S3 BUCKETS
  ##########################################################################

  # Uploads bucket - stores original images
  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-uploads-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
              - POST
            AllowedOrigins:
              - "*"
            MaxAge: 3600

  # Processed bucket - stores resized images
  ProcessedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-processed-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ##########################################################################
  # DYNAMODB TABLE
  ##########################################################################

  ResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-results-${Environment}"
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        - AttributeName: imageId
          AttributeType: S
        - AttributeName: processingType
          AttributeType: S
      KeySchema:
        - AttributeName: imageId
          KeyType: HASH
        - AttributeName: processingType
          KeyType: RANGE

  ##########################################################################
  # LAMBDA FUNCTIONS
  ##########################################################################

  # Presigned URL Generator
  PresignedUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-presigned-url-${Environment}"
      CodeUri: src/presigned-url/
      Handler: index.handler
      Description: Generates S3 presigned URLs for image uploads
      Environment:
        Variables:
          UPLOADS_BUCKET_NAME: !Ref UploadsBucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref UploadsBucket
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /upload-url
            Method: POST
            RestApiId: !Ref ImagePipelineApi

  ##########################################################################
  # API GATEWAY
  ##########################################################################

  ImagePipelineApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "${AWS::StackName}-api-${Environment}"
      StageName: !Ref Environment
      TracingEnabled: true # Enable X-Ray on API Gateway
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

##########################################################################
# OUTPUTS
##########################################################################
Outputs:
  UploadsBucketName:
    Description: S3 bucket for image uploads
    Value: !Ref UploadsBucket
    Export:
      Name: !Sub "${AWS::StackName}-UploadsBucket"

  ProcessedBucketName:
    Description: S3 bucket for processed images
    Value: !Ref ProcessedBucket
    Export:
      Name: !Sub "${AWS::StackName}-ProcessedBucket"

  ResultsTableName:
    Description: DynamoDB table for processing results
    Value: !Ref ResultsTable
    Export:
      Name: !Sub "${AWS::StackName}-ResultsTable"

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ImagePipelineApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-ApiEndpoint"

  PresignedUrlEndpoint:
    Description: Endpoint to request presigned upload URLs
    Value: !Sub "https://${ImagePipelineApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/upload-url"
